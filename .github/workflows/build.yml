name: Build

on:
  push:
    branches: ["user.js"]
  # pull_request:
    # branches: [ "user.js" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # Install pnpm with cache
      # https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install

      - name: Build
        run: |
          npx rollup --config packages/unblock-area-limit/rollup.config.js
          npx rollup --config packages/bilibili-block-ugc/rollup.config.js
          npx rollup --config packages/s3_mobile_style/rollup.config.js
          npx rollup --config packages/zhihu_mobile_style/rollup.config.js

      - name: Commit
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: build"
